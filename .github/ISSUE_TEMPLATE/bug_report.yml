name: Bug report
description: Report a reproducible problem in RailWatch 12306.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not attach cookies, Chrome profiles, order screenshots, identity data or exported logs containing personal information.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Start the Electron app
        2. Open Settings
        3. Click ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, app version or commit, Node/npm versions if running from source, Python version, Chrome version and ChromeDriver version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Electron shell
        - React renderer
        - Python sidecar
        - 12306 query analysis
        - Monitor logic
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include cookies, sessions, Chrome profile data, personal identity data or ticket/order screenshots.
          required: true
