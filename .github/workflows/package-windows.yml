name: Package Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build Windows Electron package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron installer
        run: npm run package

      - name: Set release version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RailWatch-12306-Windows-Installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

      - name: Publish updater assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v$env:PACKAGE_VERSION"
          $assets = @()
          $assets += Get-ChildItem -Path release -Filter "*.exe" -File | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem -Path release -Filter "*.blockmap" -File | ForEach-Object { $_.FullName }
          $assets += (Resolve-Path "release/latest.yml" -ErrorAction Stop).Path

          if ($assets.Count -eq 0) {
            throw "No release assets found."
          }

          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag @assets --repo $env:GITHUB_REPOSITORY --title "RailWatch 12306 $tag" --notes "Windows installer build for RailWatch 12306 $tag." --latest
          }

      - name: Upload unpacked app
        uses: actions/upload-artifact@v4
        with:
          name: RailWatch-12306-Windows-Unpacked
          path: release/win-unpacked
