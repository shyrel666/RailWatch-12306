name: Package Windows

on:
  workflow_dispatch:

jobs:
  package:
    name: Build Windows Electron package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron installer
        run: npm run package

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RailWatch-12306-Windows-Installer
          path: |
            release/*.exe
            release/*.blockmap

      - name: Upload unpacked app
        uses: actions/upload-artifact@v4
        with:
          name: RailWatch-12306-Windows-Unpacked
          path: release/win-unpacked
