name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on Windows
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Compile Python modules
        run: python -m py_compile railwatch_state.py railwatch_ui.py t12306_gui_0.py gui_12306_0.py anti_detect.py

      - name: UI smoke test
        run: |
          python -c "from PySide6.QtWidgets import QApplication; from railwatch_ui import RailWatchMainWindow; app=QApplication([]); w=RailWatchMainWindow(); assert w.windowTitle() == 'RailWatch 12306'; assert w.pages.count() == 4; assert [b.text() for b in w.nav_buttons] == ['Dashboard', 'Trip Setup', 'Monitor', 'Settings']; w.close()"
