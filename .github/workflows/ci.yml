name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test Electron app and Python runtime
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Compile Python modules
        run: python -m py_compile railwatch_state.py gui_12306_0.py anti_detect.py chromedriver_manager.py railwatch_preferences.py railwatch_bridge.py railwatch_runtime.py

      - name: Run Electron and renderer tests
        run: npm run test

      - name: Build Electron renderer and main process
        run: npm run build
